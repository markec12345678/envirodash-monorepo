name: Code Quality

on:
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run audit
        run: bun audit || true
        continue-on-error: true

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          DATABASE_URL: file:./db/test.db
          NEXT_PUBLIC_MAPTILER_KEY: test-key
          NEXTAUTH_SECRET: test-secret
        run: cd apps/web && bun run build

      - name: Check bundle size
        run: |
          BUILD_DIR="apps/web/.next/static"
          if [ -d "$BUILD_DIR" ]; then
            SIZE=$(du -sh "$BUILD_DIR" | cut -f1)
            echo "📦 Web bundle size: $SIZE"
            # Warn if bundle > 50MB
            SIZE_KB=$(du -sk "$BUILD_DIR" | cut -f1)
            if [ "$SIZE_KB" -gt 51200 ]; then
              echo "⚠️  Bundle size exceeds 50MB"
            fi
          fi

  monitor-count:
    name: Verify Monitor Count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count monitor packages
        run: |
          MONITOR_COUNT=$(ls -d monitors/*/ | wc -l)
          echo "📊 Monitor packages: $MONITOR_COUNT"
          if [ "$MONITOR_COUNT" -lt 800 ]; then
            echo "⚠️  Expected 800+ monitors, found $MONITOR_COUNT"
            exit 1
          fi
          echo "✅ Monitor count OK ($MONITOR_COUNT packages)"

          REAL_COUNT=$(find monitors -name "manifest.json" -exec grep -l '"realData": true' {} \; | wc -l)
          echo "✅ Real-data monitors: $REAL_COUNT"

      - name: Verify key files exist
        run: |
          for f in \
            "apps/web/src/app/page.tsx" \
            "apps/web/src/app/api/health/route.ts" \
            "packages/core/src/index.ts" \
            "Dockerfile" \
            "docker-compose.yml"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            fi
            echo "✅ Found: $f"
          done
