<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnviroDash — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #10b981;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 9999px;
      font-size: 0.8rem;
      color: #fca5a5;
      margin-bottom: 1.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    button {
      background: #10b981;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #059669; }
    .features {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .features ul {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .features li {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌍</div>
    <h1>EnviroDash</h1>
    <div class="status">
      <span class="dot"></span>
      You are offline
    </div>
    <p>
      You're currently offline. EnviroDash will show cached environmental data
      and automatically refresh when your connection is restored.
    </p>
    <button onclick="window.location.reload()">Try Again</button>

    <div class="features">
      <p>Cached data available offline:</p>
      <ul>
        <li>💨 Air Quality</li>
        <li>🔥 Wildfire Risk</li>
        <li>🌊 Tsunami</li>
        <li>🌋 Volcanoes</li>
        <li>🌎 Earthquakes</li>
        <li>⛅ Weather</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload()
    })
  </script>
</body>
</html>
