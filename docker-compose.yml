version: '3.8'

services:
  # ==================== PostgreSQL (optional, for production) ====================
  # Uncomment to use PostgreSQL instead of SQLite
  # db:
  #   image: postgis/postgis:16-3.4
  #   environment:
  #     POSTGRES_USER: envirodash
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-envirodash-dev}
  #     POSTGRES_DB: envirodash
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U envirodash"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # SQLite (default):
      - DATABASE_URL=file:/app/data/envirodash.db
      # PostgreSQL (uncomment if db service is enabled):
      # - DATABASE_URL=postgresql://envirodash:${POSTGRES_PASSWORD:-envirodash-dev}@db:5432/envirodash?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-envirodash-dev-secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_MAPTILER_KEY=${NEXT_PUBLIC_MAPTILER_KEY}
    volumes:
      - web-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # depends_on:
    #   db:
    #     condition: service_healthy

  alerts-ws:
    build:
      context: .
      dockerfile: mini-services/alerts-ws/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - WEB_API_URL=http://web:3000
    depends_on:
      - web
    restart: unless-stopped

volumes:
  web-data:
  # pg-data:
